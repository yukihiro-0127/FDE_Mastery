<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Bob Test - Split Files</title>
</head>
<body>
    <h1>Bob Data Test - Split Files</h1>
    <div id="result"></div>
    
    <script src="bob-data-main.js"></script>
    <script src="bob-data-extensions.js"></script>
    <script>
        const resultDiv = document.getElementById('result');
        
        // 2つのファイルを結合
        if (window.bobSectionsMain && window.bobSectionsExtensions) {
            window.bobSections = [...window.bobSectionsMain, ...window.bobSectionsExtensions];
        }
        
        if (typeof window.bobSections === 'undefined') {
            resultDiv.innerHTML = '<p style="color: red;">❌ window.bobSections is undefined</p>';
        } else {
            resultDiv.innerHTML = `
                <p style="color: green;">✅ window.bobSections loaded successfully</p>
                <p>Number of sections: ${window.bobSections.length}</p>
                <ul>
                    ${window.bobSections.map(s => `<li>${s.id}: ${s.title}</li>`).join('')}
                </ul>
            `;
        }
    </script>
</body>
</html>
