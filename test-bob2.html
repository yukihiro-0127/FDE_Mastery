<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Bob Test 2</title>
</head>
<body>
    <h1>Bob Data Test 2 - Simple Version</h1>
    <div id="result"></div>
    
    <script src="bob-data-test1.js"></script>
    <script>
        const resultDiv = document.getElementById('result');
        
        if (typeof window.bobSections === 'undefined') {
            resultDiv.innerHTML = '<p style="color: red;">❌ window.bobSections is undefined</p>';
        } else {
            resultDiv.innerHTML = `
                <p style="color: green;">✅ window.bobSections loaded successfully</p>
                <p>Number of sections: ${window.bobSections.length}</p>
            `;
        }
    </script>
</body>
</html>
