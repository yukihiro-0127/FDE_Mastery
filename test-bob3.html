<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Bob Test 3</title>
</head>
<body>
    <h1>Bob Data Test 3 - Part 1</h1>
    <div id="result"></div>
    
    <script src="bob-data-part1.js"></script>
    <script>
        const resultDiv = document.getElementById('result');
        
        if (typeof window.bobSectionsPart1 === 'undefined') {
            resultDiv.innerHTML = '<p style="color: red;">❌ window.bobSectionsPart1 is undefined</p>';
        } else {
            resultDiv.innerHTML = `
                <p style="color: green;">✅ window.bobSectionsPart1 loaded successfully</p>
                <p>Number of sections: ${window.bobSectionsPart1.length}</p>
            `;
        }
    </script>
</body>
</html>
